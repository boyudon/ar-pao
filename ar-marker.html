<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>AR — ข้อมูลโดยท่าน ผอ.</title>

  <!-- ตัวจับ/แสดงข้อผิดพลาดบนหน้าจอ (ไว้วินิจฉัยปัญหาบนมือถือ) -->
  <script>
    (function () {
      window.__ARERR = [];
      function render() {
        if (!document.body) { return; }
        var d = document.getElementById('ar-debug');
        if (!d) {
          d = document.createElement('div');
          d.id = 'ar-debug';
          d.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99999;' +
            'background:rgba(170,0,0,.92);color:#fff;font:12px/1.45 monospace;' +
            'padding:8px 10px;max-height:42vh;overflow:auto;white-space:pre-wrap;';
          document.body.appendChild(d);
        }
        d.textContent = '⚠️ DEBUG (ส่งข้อความนี้ให้ผู้ดูแล)\n' + window.__ARERR.join('\n');
      }
      var DEBUG = /[?&]debug=1/.test(location.search || '');
      window.__arlog = function (m) {
        try { console.log('[AR]', m); } catch (e) {}
        if (!DEBUG) { return; }            // โชว์แถบแดงเฉพาะเมื่อเปิดด้วย ?debug=1
        window.__ARERR.push(String(m));
        render();
      };
      window.addEventListener('error', function (e) {
        window.__arlog('JS: ' + (e.message || '') + ' @' +
          String(e.filename || '').split('/').pop() + ':' + (e.lineno || ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        window.__arlog('PROMISE: ' + (r && (r.name + ' ' + (r.message || r)) || r));
      });
      document.addEventListener('DOMContentLoaded', function () {
        if (typeof AFRAME === 'undefined') window.__arlog('AFRAME ไม่โหลด — CDN อาจถูกบล็อก/เน็ตมีปัญหา');
        if (typeof window.MINDAR === 'undefined' && !(window.AFRAME && AFRAME.systems && AFRAME.systems['mindar-image-system']))
          window.__arlog('MindAR อาจไม่โหลด');
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia)
          window.__arlog('เบราว์เซอร์นี้ไม่รองรับ getUserMedia (เปิดกล้องไม่ได้)');
        if (!window.isSecureContext) window.__arlog('ไม่ใช่ secure context (ต้องเปิดผ่าน HTTPS)');
        window.__arlog('UA: ' + navigator.userAgent);
      });
    })();
  </script>

  <!-- A-Frame + MindAR (Image Tracking) -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- ตั้งค่า + คอมโพเนนต์ -->
  <script src="./config.js"></script>
  <script src="./js/chromakey.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden;
      font-family: "Sukhumvit Set", "Noto Sans Thai", "Prompt", -apple-system, sans-serif;
      background: #0b1f3a;
    }
    a-scene { position: fixed; inset: 0; }

    .overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; color: #fff; padding: 24px;
    }
    .hidden { display: none !important; }

    /* หน้าเริ่มต้น */
    #intro {
      background: linear-gradient(160deg, #0b1f3a 0%, #123a6b 60%, #1e5aa8 100%);
    }
    #org-name { font-size: 16px; opacity: .85; letter-spacing: .5px; margin-bottom: 6px; }
    #app-title { font-size: 26px; font-weight: 700; line-height: 1.35; margin: 0 0 18px; }
    #intro-text { font-size: 15px; opacity: .9; max-width: 320px; line-height: 1.6; margin-bottom: 28px; }
    #start-btn {
      font-family: inherit; font-size: 18px; font-weight: 700;
      color: #0b1f3a; background: #ffd23f;
      border: none; border-radius: 999px;
      padding: 16px 34px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    #start-btn:active { transform: scale(.97); }
    .icon-cam { font-size: 46px; margin-bottom: 14px; }

    /* กำลังโหลด */
    #loading { background: rgba(11,31,58,.85); }
    .spinner {
      width: 46px; height: 46px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,.25); border-top-color: #ffd23f;
      animation: spin 1s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* คำใบ้ตอนเล็งกล้อง */
    #scan-hint {
      justify-content: flex-end; pointer-events: none; background: transparent;
    }
    .scan-frame {
      width: 70vw; max-width: 320px; height: 70vw; max-height: 320px;
      border: 3px solid rgba(255,255,255,.9); border-radius: 18px;
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      box-shadow: 0 0 0 4000px rgba(0,0,0,.28);
    }
    #scan-text {
      position: relative; margin-bottom: 56px; font-size: 16px;
      background: rgba(0,0,0,.45); padding: 10px 18px; border-radius: 999px;
    }
  </style>
</head>
<body>

  <!-- ===================== ฉาก AR ===================== -->
  <a-scene id="ar-scene"
    mindar-image="imageTargetSrc: ./assets/targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    embedded
    renderer="colorManagement: true; physicallyCorrectLights: true"
    loading-screen="enabled: false"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">

    <a-assets>
      <video id="director-video"
        preload="auto" loop playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="director-target" mindar-image-target="targetIndex: 0">
      <a-entity id="director-plane"
        geometry="primitive: plane; width: 1; height: 0.56"
        material="shader: flat; src: #director-video; transparent: true; side: double"
        position="0 0 0"></a-entity>
    </a-entity>
  </a-scene>

  <!-- ใช้ค่าจาก config.js กำหนดไฟล์เป้าหมาย/วิดีโอ ก่อน A-Frame เริ่มทำงาน -->
  <script>
    (function () {
      var cfg = window.AR_CONFIG || {};
      var scene = document.getElementById('ar-scene');
      var video = document.getElementById('director-video');
      if (cfg.targetSrc) {
        scene.setAttribute('mindar-image',
          'imageTargetSrc: ' + cfg.targetSrc +
          '; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;');
      }
      if (cfg.videoSrc) video.setAttribute('src', cfg.videoSrc);
    })();
  </script>

  <!-- ===================== หน้า UI ===================== -->
  <div id="intro" class="overlay">
    <div class="icon-cam">📷</div>
    <div id="org-name">องค์การบริหารส่วนจังหวัด</div>
    <h1 id="app-title">ระบบ AR แนะนำข้อมูลโดยท่าน ผอ.</h1>
    <p id="intro-text">แตะปุ่มด้านล่างเพื่ออนุญาตกล้อง แล้วเล็งกล้องไปที่ป้าย/ภาพเป้าหมาย</p>
    <button id="start-btn">เริ่ม / อนุญาตกล้อง</button>
  </div>

  <div id="loading" class="overlay hidden">
    <div class="spinner"></div>
    <div id="loading-text">กำลังเปิดกล้อง...</div>
  </div>

  <div id="scan-hint" class="overlay hidden">
    <div class="scan-frame"></div>
    <div id="scan-text">เล็งกล้องไปที่ภาพเป้าหมาย</div>
  </div>

  <script src="./js/app.js"></script>
</body>
</html>
