<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>AR — ข้อมูลโดยท่าน ผอ. (โรงเรียนพังงูวิทยา)</title>

  <!-- ตัวจับ/แสดงข้อผิดพลาดบนหน้าจอ (โชว์เฉพาะเมื่อเปิดด้วย ?debug=1) -->
  <script>
    (function () {
      window.__ARERR = [];
      function render() {
        if (!document.body) { return; }
        var d = document.getElementById('ar-debug');
        if (!d) {
          d = document.createElement('div');
          d.id = 'ar-debug';
          d.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99999;' +
            'background:rgba(170,0,0,.92);color:#fff;font:12px/1.45 monospace;' +
            'padding:8px 10px;max-height:42vh;overflow:auto;white-space:pre-wrap;';
          document.body.appendChild(d);
        }
        d.textContent = '⚠️ DEBUG (ส่งข้อความนี้ให้ผู้ดูแล)\n' + window.__ARERR.join('\n');
      }
      var DEBUG = /[?&]debug=1/.test(location.search || '');
      window.__arlog = function (m) {
        try { console.log('[AR]', m); } catch (e) {}
        if (!DEBUG) { return; }
        window.__ARERR.push(String(m));
        render();
      };
      window.addEventListener('error', function (e) {
        window.__arlog('JS: ' + (e.message || '') + ' @' +
          String(e.filename || '').split('/').pop() + ':' + (e.lineno || ''));
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        window.__arlog('PROMISE: ' + (r && (r.name + ' ' + (r.message || r)) || r));
      });
      document.addEventListener('DOMContentLoaded', function () {
        window.__arlog('UA: ' + navigator.userAgent);
      });
    })();
  </script>

  <!-- A-Frame (ฉาก 3D: คลิป ผอ. ทับบนภาพถ่าย 360°) -->
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>

  <script src="./config.js"></script>
  <script src="../js/chromakey.js"></script>
  <script src="../js/lotus.js"></script>

  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
      font-family: "Sukhumvit Set", "Noto Sans Thai", "Prompt", -apple-system, sans-serif;
      background: #16121a;
    }
    /* ภาพพื้นหลัง 360° (เต็มจอ ระหว่างโหลด) */
    #bg {
      position: fixed; inset: 0; z-index: 0;
      background: #16121a url('./assets/bg.jpg') center center / cover no-repeat;
    }
    /* ฉาก A-Frame โปร่งใส ซ้อนบนภาพ */
    #scene { position: fixed; inset: 0; z-index: 1; }

    .overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; color: #fff; padding: 24px;
    }
    .hidden { display: none !important; }
    #intro { background: linear-gradient(160deg, rgba(90,39,64,.86) 0%, rgba(138,58,85,.82) 55%, rgba(196,106,122,.8) 100%); }
    .icon-cam { font-size: 46px; margin-bottom: 14px; }
    #org-name { font-size: 16px; opacity: .9; letter-spacing: .5px; margin-bottom: 6px; }
    #app-title { font-size: 26px; font-weight: 700; line-height: 1.35; margin: 0 0 18px; text-shadow: 0 2px 12px rgba(0,0,0,.4); }
    #intro-text { font-size: 15px; opacity: .95; max-width: 320px; line-height: 1.6; margin-bottom: 28px; }
    #start-btn {
      font-family: inherit; font-size: 18px; font-weight: 700;
      color: #5a2740; background: #ffd23f; border: none; border-radius: 999px;
      padding: 16px 34px; cursor: pointer; box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }
    #start-btn:active { transform: scale(.97); }
    #loading { background: rgba(40,20,32,.7); }
    .spinner {
      width: 46px; height: 46px; border-radius: 50%;
      border: 4px solid rgba(255,255,255,.25); border-top-color: #ffd23f;
      animation: spin 1s linear infinite; margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #hint { justify-content: flex-start; pointer-events: none; background: transparent; }
    #hint .pill {
      margin-top: 56px; font-size: 14px;
      background: rgba(0,0,0,.45); padding: 9px 18px; border-radius: 999px;
    }
  </style>
</head>
<body>

  <!-- ภาพพื้นหลัง 360° -->
  <div id="bg"></div>

  <!-- ฉาก 3D: คลิป ผอ. (ตัดฉากเขียว) บนฉากหลัง 360°
       (พังงูวิทยาไม่ใช้ดอกบัว/เรือ 3D) -->
  <a-scene id="scene" loading-screen="enabled: false" vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="alpha: true; colorManagement: true">
    <a-assets>
      <img id="bgimg" src="./assets/bg.jpg" crossorigin="anonymous" />
      <video id="clip" loop playsinline webkit-playsinline crossorigin="anonymous"></video>
    </a-assets>

    <!-- ฉากหลัง 360°: ภาพพาโนรามา (หมุนมือถือมองรอบได้) -->
    <a-sky id="sky" src="#bgimg"></a-sky>

    <!-- กล้องหมุนตามเซ็นเซอร์มือถือ (มองรอบ 360°) -->
    <a-camera id="cam" position="0 1.6 0" wasd-controls-enabled="false"
      look-controls="touchEnabled: false; mouseEnabled: false; magicWindowTrackingEnabled: true"></a-camera>

    <a-entity id="director" position="0 1.2 -1.8">
      <a-entity id="director-plane">
        <!-- แท่นยืน (โพเดียม) ใต้เท้าท่าน ผอ. — เป็น child ของระนาบวิดีโอ
             เพื่อให้เลื่อนตาม offsetX แม้ตอนหันหน้าเข้ากล้อง (กึ่งกลางแท่นตรงเท้าเสมอ)
             markerless.js วางฐานที่ระดับพื้น + config.world.yOffset ให้เท้าแตะผิวแท่นพอดี -->
        <a-entity id="pedestal">
          <a-circle position="0 0.005 0" rotation="-90 0 0" radius="0.74"
            material="color: #000; opacity: 0.13; transparent: true; shader: flat"></a-circle>
          <a-cylinder radius="0.64" height="0.08" position="0 0.04 0"
            color="#2e3d4c" material="metalness: 0.2; roughness: 0.6"></a-cylinder>
          <a-cylinder radius="0.54" height="0.02" position="0 0.09 0"
            color="#c9a227" material="metalness: 0.8; roughness: 0.25"></a-cylinder>
          <a-cylinder radius="0.52" height="0.24" position="0 0.22 0"
            color="#ede8dc" material="metalness: 0.05; roughness: 0.85"></a-cylinder>
          <!-- เงาสัมผัสรี ๆ บนผิวแท่น ใต้สองเท้าของท่าน (กึ่งกลาง stance = กึ่งกลางแท่นพอดี
               หลังใช้ pedestal.offsetX) ช่วยให้เท้าหลังที่อยู่สูงกว่าขอบล่างเฟรมดูเหยียบผิวแท่นจริง -->
          <a-circle position="0 0.3405 0.01" rotation="-90 0 0" radius="0.17" scale="1.15 0.7 1"
            material="color: #000; opacity: 0.18; transparent: true; shader: flat"></a-circle>
        </a-entity>
      </a-entity>
    </a-entity>
  </a-scene>

  <!-- ใช้ค่าจาก config.js ก่อน A-Frame เริ่มทำงาน -->
  <script>
    (function () {
      var c = window.AR_CONFIG || {};
      var bg = document.getElementById('bg');
      var bgimg = document.getElementById('bgimg');
      var clip = document.getElementById('clip');
      var lf = document.getElementById('lotus-field');
      if (c.bgSrc) {
        if (bg) bg.style.backgroundImage = "url('" + c.bgSrc + "')";
        if (bgimg) bgimg.setAttribute('src', c.bgSrc);
      }
      if (c.videoSrc && clip) clip.setAttribute('src', c.videoSrc);
      if (lf && c.lotus) {
        lf.setAttribute('lotus-field',
          'src: #lotusModel; count: ' + (c.lotus.count || 60) +
          '; scale: ' + (c.lotus.scale || 1) +
          '; near: ' + (c.lotus.near || 0.8) +
          '; far: ' + (c.lotus.far || 9));
      }
    })();
  </script>

  <!-- หน้าเริ่ม -->
  <div id="intro" class="overlay">
    <div class="icon-cam">🏫</div>
    <div id="org-name">โรงเรียนพังงูวิทยา องค์การบริหารส่วนจังหวัดอุดรธานี ๕</div>
    <h1 id="app-title">ระบบ AR แนะนำข้อมูลโดยท่าน ผอ.</h1>
    <p id="intro-text">แตะเพื่อเริ่ม แล้วหมุนมือถือชมท่าน ผอ. แนะนำข้อมูลแบบ 360°</p>
    <button id="start-btn">แตะเพื่อเริ่ม</button>
  </div>

  <div id="loading" class="overlay hidden">
    <div class="spinner"></div>
    <div id="loading-text">กำลังโหลด...</div>
  </div>

  <div id="hint" class="overlay hidden">
    <div class="pill" id="hint-text">หมุน/ส่ายมือถือ ชมรอบ</div>
  </div>

  <script src="../js/markerless.js?v=2"></script>
</body>
</html>
